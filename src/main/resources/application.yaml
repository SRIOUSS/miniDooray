spring:
  application:
    name: miniDooray-FE
  mvc:
    hiddenmethod:
      filter:
        enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  session:
    store-type: redis
    timeout: 3600

api:
  gateway-url: http://localhost:8000

server:
  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax

  port: 8080
