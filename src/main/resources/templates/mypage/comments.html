<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>내 댓글</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a th:href="@{/projects}">프로젝트</a>
  <a th:href="@{/mypage/tasks}">내 태스크</a>
  <a th:href="@{/mypage/comments}">내 댓글</a>
  <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">
  <h1>내 댓글</h1>

  <table>
    <thead>
    <tr>
      <th>ID</th>
      <th>내용</th>
      <th>작성자</th>
      <th>작성일</th>
      <th>수정일</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${#lists.isEmpty(comments.commentResponseList)}">
      <td colspan="5">작성한 댓글이 없습니다.</td>
    </tr>
    <tr th:each="comment : ${comments.commentResponseList}">
      <td th:text="${comment.id}"></td>
      <td th:text="${comment.content}"></td>
      <td th:text="${comment.userId}"></td>
      <td th:text="${comment.createdAt}"></td>
      <td th:text="${comment.updatedAt}"></td>
    </tr>
    </tbody>
  </table>
</div>

</body>
</html>
