<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 댓글 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!--/* @thymesVar id="comments" type="com.nhnacademy.minidoorayfe.dto.comment.CommentListDto" */-->

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage}">마이페이지</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="nav-logout">로그아웃</button>
    </form>
</nav>

<div class="container">

    <div class="breadcrumb">
        <a th:href="@{/mypage}">마이페이지</a>
        <span>/</span>
        <span>내 댓글</span>
    </div>

    <div class="page-header">
        <h1>내 댓글</h1>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>내용</th>
                    <th>작성일</th>
                    <th>수정일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${comments == null or comments.commentResponseDtoList == null or #lists.isEmpty(comments.commentResponseDtoList)}">
                    <td colspan="4" class="empty-state">작성한 댓글이 없습니다.</td>
                </tr>
                <th:block th:if="${comments != null and comments.commentResponseDtoList != null}">
                    <tr th:each="comment : ${comments.commentResponseDtoList}">
                        <td th:text="${comment.id}"></td>
                        <td th:text="${comment.content}"></td>
                        <td th:text="${#temporals.format(comment.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${comment.updatedAt != null ? #temporals.format(comment.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
