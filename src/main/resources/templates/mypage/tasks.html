<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>내 태스크 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!--/* @thymesVar id="tasks" type="com.nhnacademy.minidoorayfe.dto.task.TaskInfoListDto" */-->

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage}">마이페이지</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">

    <div class="breadcrumb">
        <a th:href="@{/mypage}">마이페이지</a>
        <span>/</span>
        <span>내 태스크</span>
    </div>

    <div class="page-header">
        <h1>내 태스크</h1>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>상태</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${tasks == null or tasks.taskInfoDtoList == null or #lists.isEmpty(tasks.taskInfoDtoList)}">
                    <td colspan="3" class="empty-state">작성한 태스크가 없습니다.</td>
                </tr>
                <th:block th:if="${tasks != null and tasks.taskInfoDtoList != null}">
                    <tr th:each="task : ${tasks.taskInfoDtoList}">
                        <td th:text="${task.id}"></td>
                        <td th:text="${task.title}"></td>
                        <td>
                            <span th:if="${task.status != null}"
                                  th:with="s=${task.status.name().toLowerCase().replace('_', '-')}"
                                  th:classappend="${'badge-' + s}"
                                  class="badge"
                                  th:text="${task.status}"></span>
                            <span th:if="${task.status == null}" style="color:#ccc; font-size:12px;">없음</span>
                        </td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
