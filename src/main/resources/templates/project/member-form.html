<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>멤버 추가</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a th:href="@{/projects}">프로젝트</a>
  <a th:href="@{/mypage/tasks}">내 태스크</a>
  <a th:href="@{/mypage/comments}">내 댓글</a>
  <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">
  <h1>멤버 추가</h1>

  <form th:action="@{/projects/{projectId}/members(projectId=${projectId})}"
        th:object="${memberRequestDto}"
        method="post">

    <label for="userId">사용자 ID</label>
    <input type="text" id="userId" th:field="*{userId}" placeholder="사용자 ID 입력">

    <label for="auth">권한</label>
    <select id="auth" th:field="*{auth}">
      <option value="MEMBER">MEMBER</option>
      <option value="ADMIN">ADMIN</option>
    </select>

    <button type="submit" class="btn-primary">추가</button>
    <a th:href="@{/projects/{projectId}(projectId=${projectId})}">취소</a>
  </form>
</div>

</body>
</html>
