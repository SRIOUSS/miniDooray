<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>멤버 추가 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage/tasks}">내 태스크</a>
    <a th:href="@{/mypage/comments}">내 댓글</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1>멤버 추가</h1>
    </div>

    <div class="card">
        <form th:action="@{/projects/{projectId}/members(projectId=${projectId})}"
              th:object="${memberRequestDto}"
              method="post">

            <div class="form-group">
                <label class="label" for="userId">사용자 ID <span class="required">*</span></label>
                <input class="form-input" type="text" id="userId" th:field="*{userId}" placeholder="사용자 ID 입력">
            </div>

            <div class="form-group">
                <label class="label" for="auth">권한</label>
                <select class="form-input" id="auth" th:field="*{auth}">
                    <option value="MEMBER">MEMBER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">추가</button>
                <a th:href="@{/projects/{projectId}(projectId=${projectId})}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
