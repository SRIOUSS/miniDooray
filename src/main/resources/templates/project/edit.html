<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 수정</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a th:href="@{/projects}">프로젝트</a>
  <a th:href="@{/mypage/tasks}">내 태스크</a>
  <a th:href="@{/mypage/comments}">내 댓글</a>
  <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">
  <h1>프로젝트 수정</h1>

  <form th:action="@{/projects/{projectId}(projectId=${projectId})}"
        th:object="${projectRequestDto}"
        method="post">
    <input type="hidden" name="_method" value="PUT">

    <label for="title">제목</label>
    <input type="text" id="title" th:field="*{title}" placeholder="프로젝트 제목">

    <label for="description">설명</label>
    <textarea id="description" th:field="*{description}" placeholder="프로젝트 설명"></textarea>

    <label for="status">상태</label>
    <select id="status" th:field="*{status}">
      <option value="ACTIVE">활성</option>
      <option value="DORMANT">휴면</option>
      <option value="TERMINATED">종료</option>
    </select>

    <button type="submit" class="btn-primary">수정</button>
    <a th:href="@{/projects/{projectId}(projectId=${projectId})}">취소</a>
  </form>
</div>

</body>
</html>
