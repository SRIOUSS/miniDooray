<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>프로젝트 생성</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a th:href="@{/projects}">프로젝트</a>
  <a th:href="@{/mypage/tasks}">내 태스크</a>
  <a th:href="@{/mypage/comments}">내 댓글</a>
  <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">
  <h1>프로젝트 생성</h1>

  <form th:action="@{/projects}" th:object="${projectRequestDto}" method="post">
    <label for="title">제목</label>
    <input type="text" id="title" th:field="*{title}" placeholder="프로젝트 제목">

    <label for="description">설명</label>
    <textarea id="description" th:field="*{description}" placeholder="프로젝트 설명"></textarea>

    <button type="submit" class="btn-primary">생성</button>
    <a th:href="@{/projects}">취소</a>
  </form>
</div>

</body>
</html>
