<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 생성 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage/index}">마이페이지</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1>프로젝트 생성</h1>
    </div>

    <div class="card">
        <form th:action="@{/projects}" th:object="${projectRequestDto}" method="post">
            <div class="form-group">
                <label class="label" for="title">제목 <span class="required">*</span></label>
                <input class="form-input" type="text" id="title" th:field="*{title}" placeholder="프로젝트 제목">
            </div>

            <div class="form-group">
                <label class="label" for="description">설명</label>
                <textarea class="form-input" id="description" th:field="*{description}"
                          placeholder="프로젝트 설명"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">생성</button>
                <a th:href="@{/projects}" class="btn btn-secondary">취소</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
