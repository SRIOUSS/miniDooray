<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>프로젝트 상세</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage/tasks}">내 태스크</a>
    <a th:href="@{/mypage/comments}">내 댓글</a>
    <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">

    <!-- 태스크 목록 -->
    <h2>태스크 목록</h2>
    <a th:href="@{/projects/{projectId}/tasks/new(projectId=${tasks.taskInfoDtoList[0].id})}">태스크 생성</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>제목</th>
            <th>상태</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks.taskInfoDtoList}">
            <td th:text="${task.id}"></td>
            <td>
                <a th:href="@{/projects/{projectId}/tasks/{taskId}(projectId=${#vars.projectId}, taskId=${task.id})}"
                   th:text="${task.title}"></a>
            </td>
            <td th:text="${task.status}"></td>
        </tr>
        </tbody>
    </table>

    <!-- 멤버 목록 -->
    <h2>멤버 목록</h2>
    <a th:href="@{/projects/{projectId}/members/new(projectId=${#vars.projectId})}">멤버 추가</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>userId</th>
            <th>권한</th>
            <th>가입일</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="member : ${members.memberInfoDtoList}">
            <td th:text="${member.memberId}"></td>
            <td th:text="${member.userId}"></td>
            <td th:text="${member.auth}"></td>
            <td th:text="${member.joinedAt}"></td>
            <td>
                <!-- 권한 변경 -->
                <form th:action="@{/projects/{projectId}/members/{memberId}(projectId=${#vars.projectId}, memberId=${member.memberId})}"
                      method="post">
                    <input type="hidden" name="_method" value="PUT">
                    <select name="auth">
                        <option value="MEMBER">MEMBER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                    <button type="submit" class="btn-primary">권한 변경</button>
                </form>
                <!-- 멤버 삭제 -->
                <form th:action="@{/projects/{projectId}/members/{memberId}(projectId=${#vars.projectId}, memberId=${member.memberId})}"
                      method="post">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit">삭제</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
