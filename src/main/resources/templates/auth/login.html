<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="card">
    <div class="logo-area">
        <a th:href="@{/login}" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </div>
            <div class="logo-text">mini<span>Dooray</span></div>
        </a>
    </div>

    <p class="page-title">로그인</p>
    <p class="page-sub">계속하려면 로그인하세요</p>

    <!--CSRF 토큰 자동으로 추가-->
    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label class="label" for="userId">아이디</label>
            <input class="form-input" type="text" id="userId" name="userId" placeholder="아이디 입력" autofocus/>
        </div>

        <div th:if="${param.error}" class="error-msg">
            <span th:if="${param.error == 'disabled'}">계정이 비활성화되었습니다.</span>
            <span th:if="${param.error == 'blocked'}">로그인이 잠겼습니다. 잠시 후 다시 시도해주세요.</span>
            <span th:if="${param.error == 'true'}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
        </div>

        <div class="form-group">
            <label class="label" for="userPassword">비밀번호</label>
            <input class="form-input" type="password" id="userPassword" name="userPassword" placeholder="비밀번호 입력"/>

            <div th:if="${param.error != null}" class="error-msg">
                <span th:if="${#strings.toString(param.error).contains('disabled')}">계정이 비활성화되었습니다.</span>
                <span th:if="${#strings.toString(param.error).contains('blocked')}">로그인이 잠겼습니다. 잠시 후 다시 시도해주세요.</span>
                <span th:if="${#strings.toString(param.error).contains('true')}">아이디 또는 비밀번호가 올바르지 않습니다.</span>
            </div>
        </div>

        <button type="submit" class="btn-primary">로그인</button>

        <div class="links">
            <a href="#">비밀번호 찾기</a>
            <a href="#">아이디 찾기</a>
            <a th:href="@{/signup}" class="accent">회원가입</a>
        </div>
    </form>

</div>
</body>
</html>
