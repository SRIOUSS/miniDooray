<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>요청 오류 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .error-wrap {
            min-height: calc(100vh - 52px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }
        .error-code {
            font-size: 88px;
            font-weight: 700;
            color: #f59f00;
            line-height: 1;
            letter-spacing: -4px;
        }
        .error-icon-wrap {
            margin: 1.25rem auto 0;
            width: 56px;
            height: 56px;
            background: #fff9e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-title {
            font-size: 19px;
            font-weight: 600;
            color: #222;
            margin: 1.25rem 0 0.5rem;
        }
        .error-msg {
            font-size: 14px;
            color: #888;
            line-height: 1.7;
            margin-bottom: 2rem;
            word-break: break-word;
        }
        .btn-warning {
            background: #f59f00;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.15s;
            font-family: inherit;
        }
        .btn-warning:hover {
            background: #e08e00;
            text-decoration: none;
            color: #fff;
        }
    </style>
</head>
<body>

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage}">마이페이지</a>
    <form th:action="@{/logout}" method="post">
        <button type="submit" class="nav-logout">로그아웃</button>
    </form>
</nav>

<div class="error-wrap">
    <div class="error-card">
        <div class="error-code" th:text="${statusCode} ?: '4xx'">4xx</div>
        <div class="error-icon-wrap">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
                 stroke="#f59f00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <circle cx="12" cy="16.5" r="0.5" fill="#f59f00"/>
            </svg>
        </div>
        <h1 class="error-title">요청을 처리할 수 없습니다</h1>
        <p class="error-msg" th:text="${message} ?: '잘못된 요청이거나 접근 권한이 없습니다.'">
            잘못된 요청이거나 접근 권한이 없습니다.
        </p>
        <a th:href="@{/projects}" class="btn-warning">홈으로 돌아가기</a>
    </div>
</div>

</body>
</html>
