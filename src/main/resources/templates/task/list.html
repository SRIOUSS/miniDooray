<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>태스크 목록 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage/index}">마이페이지</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">
    <div class="page-header">
        <h1>태스크 목록</h1>
        <div style="display:flex; gap:8px;">
            <a th:href="@{/projects/{projectId}/tasks/new(projectId=${projectId})}" class="btn btn-primary">+ 태스크 생성</a>
            <a th:href="@{/projects/{projectId}(projectId=${projectId})}" class="btn btn-secondary">프로젝트로 돌아가기</a>
        </div>
    </div>

    <div class="card">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>제목</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(tasks.taskInfoDtoList)}">
                    <td colspan="4" class="empty-state">태스크가 없습니다.</td>
                </tr>
                <tr th:each="task : ${tasks.taskInfoDtoList}">
                    <td th:text="${task.id}"></td>
                    <td>
                        <a th:href="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.id})}"
                           th:text="${task.title}"></a>
                    </td>
                    <td th:text="${task.status}"></td>
                    <td>
                        <a th:href="@{/projects/{projectId}/tasks/{taskId}/edit(projectId=${projectId}, taskId=${task.id})}"
                           class="btn btn-secondary">수정</a>
                        <form th:action="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.id})}"
                              method="post" class="inline-form">
                            <input type="hidden" name="_method" value="DELETE">
                            <button type="submit">삭제</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
