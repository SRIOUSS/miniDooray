<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>태스크 상세 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!--/* @thymesVar id="task" type="com.nhnacademy.minidoorayfe.dto.task.TaskViewDto" */-->
<!--/* @thymesVar id="milestoneRequestDto" type="com.nhnacademy.minidoorayfe.dto.milestone.MilestoneRequestDto" */-->
<!--/* @thymesVar id="commentRequestDto" type="com.nhnacademy.minidoorayfe.dto.comment.CommentRequestDto" */-->
<!--/* @thymesVar id="allTasks" type="com.nhnacademy.minidoorayfe.dto.task.TaskInfoListDto" */-->

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage}">마이페이지</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">

    <div class="breadcrumb">
        <a th:href="@{/projects}">프로젝트 목록</a>
        <span>/</span>
        <a th:href="@{/projects/{projectId}(projectId=${projectId})}" th:text="'프로젝트 #' + ${projectId}">프로젝트</a>
        <span>/</span>
        <span th:text="${task.taskResponseDto.title}">태스크</span>
    </div>

    <!-- 전체 레이아웃: 태스크 사이드바(좌) + 메인 콘텐츠(우) -->
    <div style="display:flex; gap:1.5rem; align-items:flex-start;">

        <!-- 좌측: 프로젝트 태스크 목록 사이드바 -->
        <div class="task-sidebar">
            <div class="task-sidebar-header">태스크 목록</div>
            <div th:if="${allTasks == null or allTasks.taskInfoDtoList == null or #lists.isEmpty(allTasks.taskInfoDtoList)}"
                 style="padding:10px 14px; color:#ccc; font-size:12px;">없음</div>
            <th:block th:if="${allTasks != null and allTasks.taskInfoDtoList != null}">
                <a th:each="t : ${allTasks.taskInfoDtoList}"
                   th:href="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${t.id})}"
                   th:text="${t.title}"
                   th:classappend="${t.id == taskId ? ' active' : ''}"
                   class="task-sidebar-item"></a>
            </th:block>
        </div>

        <!-- 우측: 메인 콘텐츠 -->
        <div style="flex:1; min-width:0;">

            <!-- 상단: 태스크 정보(좌) + 마일스톤 위젯(우) -->
            <div style="display:flex; gap:1.5rem; align-items:flex-start; margin-bottom:1.5rem;">

                <!-- 태스크 정보 카드 -->
                <div class="card" style="flex:1; margin-bottom:0;">
                    <div class="page-header" style="margin-bottom:1rem;">
                        <h1 th:text="${task.taskResponseDto.title}">제목</h1>
                        <div style="display:flex; gap:6px;">
                            <a th:href="@{/projects/{projectId}/tasks/{taskId}/edit(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                               class="btn-table btn-table-edit">수정</a>
                            <form th:action="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                                  method="post">
                                <input type="hidden" name="_method" value="DELETE">
                                <button type="submit" class="btn-table btn-table-delete">삭제</button>
                            </form>
                        </div>
                    </div>

                    <p th:text="${task.taskResponseDto.content}"
                       style="margin-bottom:1rem; line-height:1.6; color:#444; min-height:2rem;"></p>

                    <div style="display:flex; gap:1.5rem; font-size:12px; color:#aaa; margin-bottom:0.75rem;">
                        <span>생성: <span th:text="${#temporals.format(task.taskResponseDto.createdAt, 'yyyy-MM-dd HH:mm')}"></span></span>
                        <span>수정: <span th:text="${task.taskResponseDto.updatedAt != null ? #temporals.format(task.taskResponseDto.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"></span></span>
                    </div>

                    <!-- 태그 -->
                    <div style="display:flex; align-items:center; gap:6px; flex-wrap:wrap;">
                        <span style="font-size:12px; color:#888; font-weight:500;">태그</span>
                        <th:block th:if="${task.taskResponseDto.tagResponseDtoList != null and !#lists.isEmpty(task.taskResponseDto.tagResponseDtoList)}">
                            <span th:each="tag : ${task.taskResponseDto.tagResponseDtoList}"
                                  style="padding:2px 10px; background:#dce6ff; color:#1a4fd6; border-radius:100px; font-size:12px;"
                                  th:text="${tag.name}"></span>
                        </th:block>
                        <span th:if="${task.taskResponseDto.tagResponseDtoList == null or #lists.isEmpty(task.taskResponseDto.tagResponseDtoList)}"
                              style="color:#ccc; font-size:12px;">없음</span>
                    </div>
                </div>

                <!-- 마일스톤 위젯 -->
                <div class="milestone-widget" id="milestoneWidget">
                    <div class="ms-top" onclick="toggleMilestone()">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                            <span class="ms-label">마일스톤</span>
                            <span id="msChevron" class="ms-chevron">▾</span>
                        </div>
                        <th:block th:if="${task.taskResponseDto.milestoneResponseDto != null}">
                            <span th:with="s=${task.taskResponseDto.milestoneResponseDto.status?.name()?.toLowerCase()?.replace('_', '-')}"
                                  th:classappend="${'badge-' + s}" class="badge"
                                  th:text="${task.taskResponseDto.milestoneResponseDto.status}"></span>
                            <div class="ms-title" th:text="${task.taskResponseDto.milestoneResponseDto.title}"></div>
                        </th:block>
                        <div th:if="${task.taskResponseDto.milestoneResponseDto == null}"
                             style="color:#ccc; font-size:13px; margin-top:4px;">없음</div>
                    </div>
                    <div class="ms-detail">
                        <th:block th:if="${task.taskResponseDto.milestoneResponseDto != null}">
                            <div th:if="${task.taskResponseDto.milestoneResponseDto.description != null
                                         and !task.taskResponseDto.milestoneResponseDto.description.isBlank()}"
                                 style="margin-bottom:6px; line-height:1.5;"
                                 th:text="${task.taskResponseDto.milestoneResponseDto.description}"></div>
                            <div th:if="${task.taskResponseDto.milestoneResponseDto.dueDate != null}"
                                 style="color:#aaa; margin-bottom:10px;"
                                 th:text="'마감 ' + ${#temporals.format(task.taskResponseDto.milestoneResponseDto.dueDate, 'yyyy-MM-dd HH:mm')}"></div>
                            <div style="display:flex; gap:6px; margin-top:4px;">
                                <button type="button" onclick="openModal('milestoneModal')"
                                        class="btn-table btn-table-edit" style="flex:1; justify-content:center;">수정</button>
                                <form th:action="@{/projects/{projectId}/tasks/{taskId}/milestones(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                                      method="post" style="flex:1; display:flex;">
                                    <input type="hidden" name="_method" value="DELETE">
                                    <button type="submit" class="btn-table btn-table-delete" style="flex:1; justify-content:center;">삭제</button>
                                </form>
                            </div>
                        </th:block>
                        <div th:if="${task.taskResponseDto.milestoneResponseDto == null}">
                            <button type="button" onclick="openModal('milestoneModal')"
                                    class="btn btn-primary" style="width:100%; padding:5px 0; font-size:12px;">+ 추가</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 댓글 -->
            <div class="card">
                <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;">
                    <h2 style="margin:0; padding:0; border:none;">댓글
                        <span th:if="${task.commentResponseDtoList != null and !#lists.isEmpty(task.commentResponseDtoList)}"
                              style="font-size:12px; color:#aaa; font-weight:400; margin-left:4px;"
                              th:text="'(' + ${task.commentResponseDtoList.size()} + ')'"></span>
                    </h2>
                    <button type="button" onclick="openModal('commentCreateModal')"
                            class="btn btn-primary" style="padding:5px 12px; font-size:12px;">+ 댓글 작성</button>
                </div>

                <div th:if="${task.commentResponseDtoList == null or #lists.isEmpty(task.commentResponseDtoList)}"
                     class="empty-state" style="padding:1.5rem 0;">댓글이 없습니다.</div>

                <th:block th:if="${task.commentResponseDtoList != null}">
                    <div th:each="comment : ${task.commentResponseDtoList}" class="comment-item">
                        <div class="comment-meta">
                            <span th:text="${comment.userId}" style="font-weight:500; color:#555;"></span>
                            <span style="margin:0 4px;">·</span>
                            <span th:text="${comment.createdAt}"></span>
                        </div>
                        <p class="comment-content" th:text="${comment.content}"></p>
                        <div class="comment-actions">
                            <button type="button"
                                    th:attr="data-content=${comment.content},data-action=@{/projects/{projectId}/tasks/{taskId}/comments/{commentId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId}, commentId=${comment.id})}"
                                    onclick="openCommentEditModal(this)"
                                    class="btn-table btn-table-edit">수정</button>
                            <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments/{commentId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId}, commentId=${comment.id})}"
                                  method="post" class="inline-form">
                                <input type="hidden" name="_method" value="DELETE">
                                <button type="submit" class="btn-table btn-table-delete">삭제</button>
                            </form>
                        </div>
                    </div>
                </th:block>
            </div>

            <a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}" class="link-muted">← 목록으로</a>
        </div>
    </div>

</div>

<!-- ===== 마일스톤 모달 ===== -->
<div id="milestoneModal" class="modal-overlay" style="display:none;">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3 th:text="${task.taskResponseDto.milestoneResponseDto != null ? '마일스톤 수정' : '마일스톤 추가'}">마일스톤</h3>
            <button type="button" class="modal-close" onclick="closeModal('milestoneModal')">×</button>
        </div>
        <form th:action="@{/projects/{projectId}/tasks/{taskId}/milestones(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
              th:object="${milestoneRequestDto}" method="post">
            <input th:if="${task.taskResponseDto.milestoneResponseDto != null}" type="hidden" name="_method" value="PUT">
            <div class="modal-body">
                <div class="form-group">
                    <label class="label" for="msTitle">제목</label>
                    <input type="text" id="msTitle" th:field="*{title}" placeholder="마일스톤 제목">
                </div>
                <div class="form-group">
                    <label class="label" for="msStatus">상태</label>
                    <select id="msStatus" th:field="*{status}">
                        <option value="PLANNED">예정</option>
                        <option value="IN_PROGRESS">진행 중</option>
                        <option value="COMPLETED">완료</option>
                        <option value="CANCELLED">취소됨</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="label" for="msDescription">설명</label>
                    <input type="text" id="msDescription" th:field="*{description}" placeholder="설명 (선택)">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="label" for="dueDateDate">마감 날짜</label>
                        <input type="date" id="dueDateDate" name="dueDateDate"
                               th:value="${milestoneRequestDto.dueDate != null ? #temporals.format(milestoneRequestDto.dueDate, 'yyyy-MM-dd') : ''}">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label class="label" for="dueDateTime">마감 시간 <span style="color:#aaa; font-weight:400;">(HH:MM)</span></label>
                        <input type="text" id="dueDateTime" name="dueDateTime" placeholder="예: 14:30"
                               th:value="${milestoneRequestDto.dueDate != null ? #temporals.format(milestoneRequestDto.dueDate, 'HH:mm') : ''}">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('milestoneModal')">취소</button>
                <button type="submit" class="btn btn-primary"
                        th:text="${task.taskResponseDto.milestoneResponseDto != null ? '수정' : '추가'}">저장</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== 댓글 작성 모달 ===== -->
<div id="commentCreateModal" class="modal-overlay" style="display:none;">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>댓글 작성</h3>
            <button type="button" class="modal-close" onclick="closeModal('commentCreateModal')">×</button>
        </div>
        <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
              th:object="${commentRequestDto}" method="post">
            <div class="modal-body">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="label" for="createCommentContent">내용</label>
                    <textarea id="createCommentContent" th:field="*{content}" placeholder="댓글 내용을 입력하세요."
                              style="min-height:100px;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('commentCreateModal')">취소</button>
                <button type="submit" class="btn btn-primary">작성</button>
            </div>
        </form>
    </div>
</div>

<!-- ===== 댓글 수정 모달 ===== -->
<div id="commentEditModal" class="modal-overlay" style="display:none;">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>댓글 수정</h3>
            <button type="button" class="modal-close" onclick="closeModal('commentEditModal')">×</button>
        </div>
        <form id="commentEditForm" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="_method" value="PUT">
            <div class="modal-body">
                <div class="form-group" style="margin-bottom:0;">
                    <label class="label" for="editCommentContent">내용</label>
                    <textarea id="editCommentContent" name="content" placeholder="댓글 내용"
                              style="min-height:100px;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('commentEditModal')">취소</button>
                <button type="submit" class="btn btn-primary">수정</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function toggleMilestone() {
        document.getElementById('milestoneWidget').classList.toggle('ms-open');
    }

    function openCommentEditModal(btn) {
        document.getElementById('editCommentContent').value = btn.getAttribute('data-content');
        document.getElementById('commentEditForm').action = btn.getAttribute('data-action');
        openModal('commentEditModal');
    }

    document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeModal(overlay.id);
        });
    });
</script>

</body>
</html>
