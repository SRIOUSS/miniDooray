<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>태스크 상세 - miniDooray</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!--/* @thymesVar id="task" type="com.nhnacademy.minidoorayfe.dto.task.TaskViewDto" */-->
<!--/* @thymesVar id="milestoneRequestDto" type="com.nhnacademy.minidoorayfe.dto.milestone.MilestoneRequestDto" */-->
<!--/* @thymesVar id="commentRequestDto" type="com.nhnacademy.minidoorayfe.dto.comment.CommentRequestDto" */-->

<nav class="nav">
    <a th:href="@{/projects}" class="nav-logo">
        <div class="nav-logo-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="7" height="7" rx="1"/>
                <rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/>
                <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
        </div>
        <span class="nav-logo-text">miniDooray</span>
    </a>
    <a th:href="@{/projects}">프로젝트</a>
    <a th:href="@{/mypage}">마이페이지</a>
    <a th:href="@{/logout}" class="nav-logout">로그아웃</a>
</nav>

<div class="container">

    <!-- 태스크 정보 -->
    <div class="card">
        <div class="page-header" style="margin-bottom: 1rem;">
            <h1 th:text="${task.taskResponseDto.title}">제목</h1>
            <div style="display:flex; gap:8px;">
                <a th:href="@{/projects/{projectId}/tasks/{taskId}/edit(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                   class="btn btn-secondary">수정</a>
                <form th:action="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                      method="post" class="inline-form">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit">삭제</button>
                </form>
            </div>
        </div>

        <p th:text="${task.taskResponseDto.content}" style="margin-bottom: 1rem; line-height: 1.6;"></p>

        <div style="display:flex; gap:1.5rem; font-size:12px; color:#aaa;">
            <span>생성일: <span th:text="${task.taskResponseDto.createdAt}"></span></span>
            <span>수정일: <span th:text="${task.taskResponseDto.updatedAt}"></span></span>
        </div>

        <!-- 태그 -->
        <div style="margin-top: 1rem;">
            <span style="font-size:12px; color:#666; font-weight:500;">태그</span>
            <span th:each="tag : ${task.taskResponseDto.tagResponseDtoList}"
                  style="display:inline-block; margin-left:6px; padding:2px 10px; background:#dce6ff; color:#1a4fd6; border-radius:100px; font-size:12px;"
                  th:text="${tag.name}">
            </span>
        </div>
    </div>

    <!-- 마일스톤 -->
    <div class="card">
        <h2>마일스톤</h2>

        <!-- 마일스톤 존재 시 -->
        <div th:if="${task.taskResponseDto.milestoneResponseDto != null}">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px 1.5rem; margin-bottom:1.25rem;">
                <p><span style="color:#888; font-size:12px;">제목</span><br>
                    <span th:text="${task.taskResponseDto.milestoneResponseDto.title}"></span></p>
                <p><span style="color:#888; font-size:12px;">상태</span><br>
                    <span th:text="${task.taskResponseDto.milestoneResponseDto.status}"></span></p>
                <p><span style="color:#888; font-size:12px;">설명</span><br>
                    <span th:text="${task.taskResponseDto.milestoneResponseDto.description}"></span></p>
                <p><span style="color:#888; font-size:12px;">마감일</span><br>
                    <span th:text="${task.taskResponseDto.milestoneResponseDto.dueDate}"></span></p>
            </div>

            <!-- 마일스톤 수정 폼 -->
            <form th:action="@{/projects/{projectId}/tasks/{taskId}/milestones(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                  th:object="${milestoneRequestDto}" method="post">
                <input type="hidden" name="_method" value="PUT">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div class="form-group">
                        <label class="label" for="milestoneTitle">제목</label>
                        <input class="form-input" type="text" id="milestoneTitle" th:field="*{title}" placeholder="제목">
                    </div>
                    <div class="form-group">
                        <label class="label" for="milestoneStatus">상태</label>
                        <select class="form-input" id="milestoneStatus" th:field="*{status}">
                            <option value="PLANNED">PLANNED</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="COMPLETED">COMPLETED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label" for="milestoneDescription">설명</label>
                        <input class="form-input" type="text" id="milestoneDescription" th:field="*{description}"
                               placeholder="설명">
                    </div>
                    <div class="form-group">
                        <label class="label" for="milestoneDueDate">마감일</label>
                        <input class="form-input" type="datetime-local" id="milestoneDueDate" th:field="*{dueDate}">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">마일스톤 수정</button>
                </div>
            </form>

            <!-- 마일스톤 삭제 -->
            <form th:action="@{/projects/{projectId}/tasks/{taskId}/milestones(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                  method="post" style="margin-top:8px;">
                <input type="hidden" name="_method" value="DELETE">
                <button type="submit">마일스톤 삭제</button>
            </form>
        </div>

        <!-- 마일스톤 없을 시 생성 -->
        <div th:if="${task.taskResponseDto.milestoneResponseDto == null}">
            <p style="color:#aaa; font-size:13px; margin-bottom:1rem;">마일스톤이 없습니다. 새로 생성하세요.</p>
            <form th:action="@{/projects/{projectId}/tasks/{taskId}/milestones(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                  th:object="${milestoneRequestDto}" method="post">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <div class="form-group">
                        <label class="label" for="newMilestoneTitle">제목</label>
                        <input class="form-input" type="text" id="newMilestoneTitle" th:field="*{title}"
                               placeholder="제목">
                    </div>
                    <div class="form-group">
                        <label class="label" for="newMilestoneStatus">상태</label>
                        <select class="form-input" id="newMilestoneStatus" th:field="*{status}">
                            <option value="PLANNED">PLANNED</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="COMPLETED">COMPLETED</option>
                            <option value="CANCELLED">CANCELLED</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="label" for="newMilestoneDescription">설명</label>
                        <input class="form-input" type="text" id="newMilestoneDescription" th:field="*{description}"
                               placeholder="설명">
                    </div>
                    <div class="form-group">
                        <label class="label" for="newMilestoneDueDate">마감일</label>
                        <input class="form-input" type="datetime-local" id="newMilestoneDueDate" th:field="*{dueDate}">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">마일스톤 생성</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 댓글 -->
    <div class="card">
        <h2>댓글</h2>

        <div th:if="${#lists.isEmpty(task.commentResponseDtoList)}">
            <p class="empty-state">댓글이 없습니다.</p>
        </div>

        <div th:each="comment : ${task.commentResponseDtoList}" class="comment-item">
            <div class="comment-meta">
                <span th:text="${comment.userId}"></span> · <span th:text="${comment.createdAt}"></span>
            </div>
            <p class="comment-content" th:text="${comment.content}"></p>
            <div class="comment-actions">
                <!-- 댓글 수정 -->
                <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments/{commentId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId}, commentId=${comment.id})}"
                      th:object="${commentRequestDto}" method="post"
                      style="display:flex; gap:6px; align-items:center;">
                    <input type="hidden" name="_method" value="PUT">
                    <input class="form-input" type="text" th:field="*{content}" placeholder="댓글 수정"
                           aria-label="댓글 수정 내용"
                           style="width:280px; padding:6px 10px;">
                    <button type="submit" class="btn btn-primary" style="padding:6px 14px; white-space:nowrap;">수정
                    </button>
                </form>
                <!-- 댓글 삭제 -->
                <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments/{commentId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId}, commentId=${comment.id})}"
                      method="post" class="inline-form">
                    <input type="hidden" name="_method" value="DELETE">
                    <button type="submit">삭제</button>
                </form>
            </div>
        </div>

        <!-- 댓글 작성 -->
        <div style="margin-top:1.25rem; padding-top:1.25rem; border-top:1px solid #f0f0f0;">
            <p style="font-size:13px; font-weight:600; color:#333; margin-bottom:0.5rem;">댓글 작성</p>
            <form th:action="@{/projects/{projectId}/tasks/{taskId}/comments(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
                  th:object="${commentRequestDto}" method="post">
                <label for="commentContent" class="label" style="display:none;">댓글 내용</label>
                <textarea class="form-input" id="commentContent" th:field="*{content}" placeholder="댓글 내용"
                          style="min-height:80px;"></textarea>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">댓글 작성</button>
                </div>
            </form>
        </div>
    </div>

    <a th:href="@{/projects/{projectId}/tasks(projectId=${projectId})}"
       class="link-muted">← 목록으로</a>

</div>

</body>
</html>
