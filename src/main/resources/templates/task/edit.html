<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>태스크 수정</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="nav">
  <a th:href="@{/projects}">프로젝트</a>
  <a th:href="@{/mypage/tasks}">내 태스크</a>
  <a th:href="@{/mypage/comments}">내 댓글</a>
  <a th:href="@{/logout}">로그아웃</a>
</nav>

<div class="container">
  <h1>태스크 수정</h1>

  <form th:action="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}"
        th:object="${taskRequestDto}"
        method="post">
    <input type="hidden" name="_method" value="PUT">

    <label for="title">제목</label>
    <input type="text" id="title" th:field="*{title}"
           th:value="${task.taskResponseDto.title}"
           placeholder="태스크 제목">

    <label for="content">내용</label>
    <textarea id="content" th:field="*{content}"
              th:text="${task.taskResponseDto.content}"
              placeholder="태스크 내용"></textarea>

    <label for="tagNameList">태그</label>
    <input type="text" id="tagNameList" name="tagNameList"
           th:value="${#strings.listJoin(task.taskResponseDto.tagResponseList.![name], ', ')}"
           placeholder="태그 입력 (쉼표로 구분) ex) tag1, tag2">

    <button type="submit" class="btn-primary">수정</button>
    <a th:href="@{/projects/{projectId}/tasks/{taskId}(projectId=${projectId}, taskId=${task.taskResponseDto.taskId})}">취소</a>
  </form>
</div>

</body>
</html>
